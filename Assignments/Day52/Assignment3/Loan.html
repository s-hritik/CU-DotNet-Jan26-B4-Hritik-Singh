<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Loan.css">
    <title>ClearDebt Loan Calculator</title>
</head>
<body>

    <div class="main-container">
        <h2>ClearDebt Loan Calculator</h2>
        
        <div class="input-box">
            <label>Loan Amount (P):</label>
            <input type="number" id="amount" placeholder="e.g. 50000">
        </div>
        <div class="input-box">
            <label>Annual Interest (%):</label>
            <input type="number" id="rate" step="0.01" placeholder="e.g. 8.5">
        </div>
        <div class="input-box">
            <label>Tenure (Months):</label>
            <input type="number" id="months" placeholder="e.g. 12">
        </div>
        
        <button onclick="generateSchedule()">Calculate EMI Schedule</button>

        <table id="loanTable">
            <thead>
                <tr>
                    <th>SNO</th>
                    <th>Loan Left</th>
                    <th>EMI</th>
                    <th>Principal</th>
                    <th>Interest</th>
                    <th>Remaining Balance</th>
                </tr>
            </thead>
            <tbody id="scheduleBody"></tbody>
        </table>
    </div>

    <script src="Loan.js"></script>
</body>
</html>
