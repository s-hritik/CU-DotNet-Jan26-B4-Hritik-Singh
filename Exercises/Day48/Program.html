<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Admission Form</title>
</head>
<body>
    <h1 style="text-align: center;">Chandigarh University</h1>
    <h2 style="text-align: center;">Official Admission Portal</h2>

    <form id="admissionForm">
        <table align="center" cellpadding="10">
            <tr>
                <td><label for="name">Full Name:</label></td>
                <td><input type="text" id="name" name="name" placeholder="John Doe" required></td>
            </tr>

            <tr>
                <td><label for="email">Email Address:</label></td>
                <td><input type="email" id="email" name="email" placeholder="name@example.com" required></td>
            </tr>
            <tr>
                <td><label for="phone">Phone Number:</label></td>
                <td><input type="tel" id="phone" name="phone" placeholder="1234567890" pattern="[0-9]{10}" required></td>
            </tr>

            <tr>
                <td><label for="dob">Date of Birth:</label></td>
                <td><input type="date" id="dob" name="dob" required></td>
            </tr>

            <tr>
                <td>Gender:</td>
                <td>
                    <input type="radio" id="male" name="gender" value="male" required>
                    <label for="male">Male</label>
                    <input type="radio" id="female" name="gender" value="female">
                    <label for="female">Female</label>
                </td>
            </tr>

            <tr>
                <td><label for="course">Preferred Course:</label></td>
                <td>
                    <select id="course" name="course" required>
                        <option value="">-- Choose Course --</option>
                        <option value="B.Tech">B.Tech (Engineering)</option>
                        <option value="MBA">MBA (Management)</option>
                        <option value="MCA">MCA (Computers)</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td><label for="marks">12th Grade Percentage:</label></td>
                <td><input type="number" id="marks" name="marks" min="0" max="100" step="0.01" required></td>
            </tr>

            <tr>
                <td><label for="address">Permanent Address:</label></td>
                <td><textarea id="address" name="address" rows="3" cols="22" placeholder="Enter your full address..."></textarea></td>
            </tr>

            <tr>
                <td><label for="photo">Upload Passport Photo:</label></td>
                <td><input type="file" id="photo" name="photo" accept="image/*"></td>
            </tr>

            <tr>
                <td>Hostel Required:</td>
                <td><input type="checkbox" id="hostel" name="hostel" value="yes"> <label for="hostel">Yes, I need accommodation</label></td>
            </tr>

            <tr>
                <td colspan="2" align="center">
                    <button type="submit">Submit Application</button>
                    <button type="reset">Clear Form</button>
                </td>
            </tr>
        </table>
    </form>

</body>
</html>
